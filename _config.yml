title: Reach Beyond Therapy
url: "https://www.reachbeyondtherapy.com"
baseurl: ""

permalink: /blog/:slug/

plugins:
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      permalink: /:basename.html
  - scope:
      path: "sitemap.xml"
    values:
      permalink: /sitemap.xml
  - scope:
      path: "admin"
    values:
      sitemap: false
  - scope:
      path: "assets"
    values:
      sitemap: false

exclude:
  - "_site"
  - "images/README.md"
  - "ISSUES.md"
  - "README.md"
  - "Style-Cheat-Sheet-RBT.pdf"
  - "Brand Style Guide-Full-RBT.pdf"
