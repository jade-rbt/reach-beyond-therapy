local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "/blog/{{slug}}/"
    fields:
      - { label: "Layout",      name: "layout",      widget: "hidden", default: "blog-post" }
      - { label: "Title",       name: "title",       widget: "string" }
      - { label: "Date",        name: "date",        widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Author",      name: "author",      widget: "string",   default: "Jade Wong" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Featured Image", name: "image",    widget: "image",    required: false, hint: "Upload the blog thumbnail image" }
      - { label: "Body",        name: "body",        widget: "markdown" }
